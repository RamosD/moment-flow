[tool.ruff]
line-length = 100
target-version = "py313"
extend-exclude = [
    "venv",
    "migrations",
    "manage.py",
]

[tool.ruff.lint]
# E/W: pycodestyle, F: pyflakes, I: isort, UP: pyupgrade, B: bugbear
select = ["E", "W", "F", "I", "UP", "B"]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"config/settings.py" = ["E501"]

[tool.coverage.run]
source = ["apps"]
branch = true
omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/__init__.py",
    "manage.py",
    "config/*",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
exclude_lines = [
    "pragma: no cover",
    "def __str__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
